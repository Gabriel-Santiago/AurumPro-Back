services:
  postgres:
    image: postgres:16
    container_name: aurumpro-postgres
    environment:
      POSTGRES_DB: aurumpro
      POSTGRES_USER: aurumpro
      POSTGRES_PASSWORD: aurumpro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: aurumpro-backend
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/aurumpro
      DB_USERNAME: aurumpro
      DB_PASSWORD: aurumpro
      JWT_SECRET: chave_de_teste_bem_grande
      MAIL_USERNAME: seuemail@gmail.com
      MAIL_PASSWORD: senha_de_app

volumes:
  postgres_data: